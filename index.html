<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Nómina</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<main class="container">

  <h1>Calculadora de Nómina</h1>

  <!-- DATOS EMPLEADO -->

  <section id="datosEmpleado">

    <h2>Datos del Empleado</h2>

    <label for="nombreCompleto">Nombre:</label>
    <input type="text" id="nombreCompleto" required>

    <label for="edad">Edad:</label>
    <input type="number" id="edad" required>

    <label for="tipoDocumento">Tipo Documento:</label>
    <select id="tipoDocumento" required>
      <option value="">Seleccione</option>
      <option value="CC">Cedula de Ciudadania</option>
      <option value="TI">Tarjeta de Identidad</option>
      <option value="CE">Cedula de Extranjeria</option>
    </select>

    <label for="numeroDocumento">Número Documento:</label>
    <input type="text" id="numeroDocumento" required>

    <button type="button" onclick="confirmarDatosEmpleado()">
      Confirmar Datos
    </button>

  </section>

  <!-- DATOS LABORALES -->
  <section id="datosLaborales">

    <h2>Datos Laborales</h2>

    <label for="salario">Salario:</label>
    <input type="number" id="salario">

    <label for="comisiones">Comisiones:</label>
    <input type="number" id="comisiones">

    <label for="horasExtra">Horas Extra:</label>
    <input type="number" id="horasExtra">

    <label for="riesgo">Nivel Riesgo:</label>
    <select id="riesgo">
      <option value="1">Riesgo 1</option>
      <option value="2">Riesgo 2</option>
      <option value="3">Riesgo 3</option>
      <option value="4">Riesgo 4</option>
      <option value="5">Riesgo 5</option>
    </select>

    <button type="button" onclick="calcularNomina()">
      Calcular Nómina
    </button>

  </section>

  // RESULTADOS
  <section id="resultado">

    <h2>Resultado</h2>

    <p id="resultadoNombre"></p>
    <p id="resultadoDevengado"></p>
    <p id="resultadoIBC"></p>
    <p id="resultadoDeducciones"></p>
    <p id="resultadoTotal"></p>

  </section>

</main>

</body>
</html>
