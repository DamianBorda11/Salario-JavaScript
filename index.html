<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Nómina</title>
  <script src="script.js"></script>
</head>

<body>
<form>

  <section id="datosEmpleado">
    <h2>Datos del Empleado</h2>

  <label for="nombreCompleto">Nombre:</label>
  <input type="text" id="nombreCompleto" name="nombre" required>

  <label for="edad">edad:</label>
  <input type="number" id="edad" name="edad" required>

  <label for="tipoDocumento">Tipo de documento:</label>
  <select id="tipoDocumento" name="tipoDocumento" required>
    <option value="CC">Cédula de Ciudadanía</option>
    <option value="TI">Tarjeta de Identidad</option>
    <option value="CE">Cédula de Extranjería</option>
  </select>

  <label for="numeroDocumento">Número de documento:</label>
  <input type="text" id="numeroDocumento" name="numeroDocumento" required>

  

  </section>
  
  <section>
    <h2>Datos Laborales</h2>


  <label for="salario">Salario Minimo:</label>
  <input type="number" id="salario" name="salario" required>

  <label for="horasExtra">Horas extra:</label>
  <input type="number" id="horasExtra" name="horasExtra" required>

  </section>
</form>
</body>
</html>
